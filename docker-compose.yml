version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: linkup-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkup
      POSTGRES_PASSWORD: linkup
      POSTGRES_DB: linkup
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkup"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: linkup-backend
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      DATABASE_URL: postgresql://linkup:linkup@db:5432/linkup
      JWT_SECRET: dev_secret_change_in_prod
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: linkup-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_HTTP_HOST: http://localhost:5001
      NEXT_PUBLIC_WS_HOST: ws://localhost:5001
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: your-nextauth-secret-key-here
      GOOGLE_CLIENT_ID: your-google-client-id-here
      GOOGLE_CLIENT_SECRET: your-google-client-secret-here

    depends_on:
      - backend

volumes:
  pgdata: